session:
  delay_minutes: 30
  delay_minutes_offhours: 60
  offhours_utc: 15:00-03:00
  max_duration_minutes: 90
phase:
  current: autotest_generation
  generation_allowed: true
  coverage_override: -1
  scope: planner,2724
thresholds:
  knowledge_coverage_target: 0.8
  note_quality_min_links: 2
repos:
  local_clone_path: expert-system/repos/
  default_branch: release/2.1
  additional_branches:
  - stage
testing_dev_envs:
  primary:
    name: qa-1
  secondary:
    name: timemachine
testing_prod_envs:
  primary:
    name: stage
current_sprint: 15
autonomy:
  mode: full
  max_sessions: 250
  consecutive_failure_limit: 30
  auto_phase_transition: true
  log_dir: expert-system/logs
  stop: false
  model: opus
  effort: max
  allow_api_mutations: true
peak_hours:
  enabled: true
  range_utc: 12:00-19:00
  weekdays_only: true
  buffer_minutes: 40
autotest:
  enabled: true
  target_env: qa-1
  max_tests_per_session: 5
  auto_fix_attempts: 3
  scope: 2724
  priority_order:
  - vacation
  - sick-leave
  - day-off
  - reports
  - statistics
  - accounting
  - admin
  - planner
  - security
  - cross-service
  type_priority:
  - UI
  - hybrid
  skip_patterns: []
