session:
  delay_minutes: 5
  delay_minutes_offhours: 5
  offhours_utc: 15:00-03:00
  max_duration_minutes: 120
phase:
  current: knowledge_acquisition
  generation_allowed: true
  coverage_override: -1
  scope: 3404
thresholds:
  knowledge_coverage_target: 0.8
  note_quality_min_links: 2
repos:
  local_clone_path: expert-system/repos/
  default_branch: release/2.1
  additional_branches:
  - stage
testing_dev_envs:
  primary:
    name: timemachine
  secondary:
    name: qa-1
testing_prod_envs:
  primary:
    name: stage
current_sprint: 15
autonomy:
  mode: full
  max_sessions: 250
  consecutive_failure_limit: 30
  auto_phase_transition: true
  log_dir: expert-system/logs
  stop: false
  model: opus
  effort: max
  allow_api_mutations: true
promo:
  enabled: true
  peak_hours_utc: 12:00-18:00
  weekdays_only: true
  expires: '2026-03-29'
  buffer_minutes: 40
autotest:
  enabled: true
  target_env: qa-1
  max_tests_per_session: 5
  auto_fix_attempts: 3
  scope: 3404
  priority_order:
  - vacation
  - sick-leave
  - day-off
  - reports
  - statistics
  - accounting
  - admin
  - planner
  - security
  - cross-service
  type_priority:
  - UI
  - hybrid
  skip_patterns: []
