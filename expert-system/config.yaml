session:
  delay_minutes: 30
  delay_minutes_offhours: 30
  offhours_utc: 15:00-03:00
  max_duration_minutes: 120
phase:
  current: autotest_generation
  generation_allowed: true
  coverage_override: -1
thresholds:
  knowledge_coverage_target: 0.8
  note_quality_min_links: 2
repos:
  local_clone_path: expert-system/repos/
  default_branch: release/2.1
  additional_branches:
  - stage
testing_dev_envs:
  primary:
    name: timemachine
  secondary:
    name: qa-1
testing_prod_envs:
  primary:
    name: stage
current_sprint: 15
autonomy:
  mode: full
  max_sessions: 200
  consecutive_failure_limit: 3
  auto_phase_transition: true
  log_dir: expert-system/logs
  stop: false
  model: opus
  effort: max
  allow_api_mutations: true
promo:
  enabled: true
  peak_hours_utc: "12:00-18:00"     # pause autonomous sessions during this UTC window
  weekdays_only: true                # peak hours apply only Mon-Fri (weekends are all off-peak)
  expires: "2026-03-29"              # promo ends — feature auto-disables after this date
  buffer_minutes: 40                 # don't start session if it would likely overlap into peak hours
autotest:
  enabled: true
  target_env: qa-1
  max_tests_per_session: 5
  auto_fix_attempts: 3
  scope: vacation                   # "all" or a module name from test-docs/ (vacation, sick-leave, etc.)
  priority_order:
  - vacation
  - sick-leave
  - day-off
  - reports
  - statistics
  - accounting
  - admin
  - planner
  - security
  - cross-service
  type_priority:
  - UI
  - API
  - hybrid
  skip_patterns: []
