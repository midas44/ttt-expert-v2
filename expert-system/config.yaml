projects:
  - id: ttt
    primary: true
    config_dir: config/ttt
    vault_root: ""
  - id: cs
    primary: false
    config_dir: config/cs
    vault_root: cs/
  - id: pmt
    primary: false
    config_dir: config/pmt
    vault_root: pmt/
primary_project: ttt
session:
  delay_minutes: 5
  delay_minutes_offhours: 5
  offhours_utc: 15:00-03:00
  max_duration_minutes: 90
phase:
  current: autotest_generation
  generation_allowed: true
  coverage_override: -1
  scope: "collection:digest"
thresholds:
  knowledge_coverage_target: 1.0
  note_quality_min_links: 2
repos:
  local_clone_path: expert-system/repos/
  default_branch: release/2.1
  additional_branches:
  - stage
testing_dev_envs:
  primary:
    name: qa-1
  secondary:
    name: timemachine
testing_prod_envs:
  primary:
    name: stage
current_sprint: 16
autonomy:
  mode: full
  max_sessions: 250
  consecutive_failure_limit: 30
  auto_phase_transition: true
  log_dir: expert-system/logs
  stop: true
  model: opus
  effort: max
  effort_phase_a: max
  effort_phase_b: max
  effort_phase_c: max
  allow_api_mutations: true
stop_at: ''
peak_hours:
  enabled: true
  range_utc: 12:00-19:00
  weekdays_only: true
  buffer_minutes: 40
autotest:
  enabled: true
  target_env: qa-1
  target_env_cs: preprod
  target_env_pmt: preprod
  max_tests_per_session: 5
  auto_fix_attempts: 3
  scope: collection:digest
  priority_order:
  - vacation
  - sick-leave
  - day-off
  - reports
  - statistics
  - accounting
  - admin
  - planner
  - security
  - integration
  type_priority:
  - UI
  - hybrid
  skip_patterns: []
